name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install maturin
        run: python -m pip install --upgrade pip maturin

      - name: Test
        run: tools/test.sh

      - name: Build release binary
        run: cargo build --release

      - name: Build Python wheel
        run: maturin build --release --strip --out dist/py-dist

      - name: Package release assets
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          arch="$(uname -m)"
          asset="sbrun-${tag}-macos-${arch}.tar.gz"
          mkdir -p dist/pkg
          cp target/release/sbrun README.md sbrun.default.toml dist/pkg/
          tar -C dist/pkg -czf "dist/${asset}" .
          shasum -a 256 "dist/${asset}" > dist/SHA256SUMS
          printf 'RELEASE_ASSET=%s\n' "dist/${asset}" >> "$GITHUB_ENV"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          assets=("${RELEASE_ASSET}" dist/SHA256SUMS dist/py-dist/*.whl)
          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" "${assets[@]}" --clobber
          else
            gh release create "${tag}" "${assets[@]}" --verify-tag --generate-notes
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/py-dist/
