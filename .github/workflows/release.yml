name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: macos
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install maturin
        run: python -m pip install --upgrade pip maturin

      - name: Test
        run: tools/test.sh

      - name: Build release binary
        run: cargo build --release

      - name: Build Python wheel
        run: maturin build --release --strip --out dist/py-dist

      - name: Package release assets
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          arch="$(uname -m)"
          asset="sbrun-${tag}-${{ matrix.platform }}-${arch}.tar.gz"
          default_conf="sbrun.default.${{ matrix.platform }}.toml"
          mkdir -p dist/pkg
          cp target/release/sbrun README.md "$default_conf" dist/pkg/
          tar -C dist/pkg -czf "dist/${asset}" .
          sha256sum "dist/${asset}" > "dist/SHA256SUMS-${{ matrix.platform }}"
          printf 'RELEASE_ASSET=%s\n' "dist/${asset}" >> "$GITHUB_ENV"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: |
            dist/py-dist/*.whl
            dist/sbrun-*.tar.gz
            dist/SHA256SUMS-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Combine checksums
        run: cat artifacts/SHA256SUMS-* > artifacts/SHA256SUMS

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          assets=(artifacts/sbrun-*.tar.gz artifacts/SHA256SUMS artifacts/*.whl)
          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" "${assets[@]}" --clobber
          else
            gh release create "${tag}" "${assets[@]}" --verify-tag --generate-notes
          fi

  pypi:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: artifacts/
