name: test

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: macos
            run_integration: true
          - os: ubuntu-latest
            platform: linux
            run_integration: false

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Dev Dependencies
        if: ${{ matrix.run_integration }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Rust Tests
        if: ${{ !matrix.run_integration }}
        run: |
          cargo test
          cargo build

      - name: Full Test Suite
        if: ${{ matrix.run_integration }}
        run: tools/test.sh
